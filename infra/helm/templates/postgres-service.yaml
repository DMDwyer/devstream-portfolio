apiVersion: v1
kind: Service
metadata:
  name: {{ include "devstream-portfolio.fullname" . }}-db
  labels:
    app.kubernetes.io/name: {{ include "devstream-portfolio.name" . }}-db
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgresql
  selector:
    app.kubernetes.io/component: database
