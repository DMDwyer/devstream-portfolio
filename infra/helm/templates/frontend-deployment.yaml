apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devstream-portfolio.fullname" . }}-frontend
  labels:
    app.kubernetes.io/name: {{ include "devstream-portfolio.name" . }}-frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/component: frontend
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.image.repository }}-frontend:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 4000 # Angular SSR Express server
        resources:
          limits:
            cpu: "250m"
            memory: "256Mi"
          requests:
            cpu: "50m"
            memory: "128Mi"